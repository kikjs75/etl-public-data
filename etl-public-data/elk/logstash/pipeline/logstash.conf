input {
  beats {
    port => 5044
  }
}

filter {
  # JSON이 아닌 이벤트는 파싱 시도 없이 즉시 드롭
  # (Logstash 자체 WARN 로그, portfolio-app 등 타 컨테이너 로그 포함)
  # → 파싱 시도 전에 드롭해야 WARN 로그가 생성되지 않아 재귀 루프 방지
  if [message] !~ /^\s*\{/ {
    drop {}
  }

  # message 필드에 담긴 JSON 파싱
  json {
    source => "message"
  }

  # JSON 파싱 실패 이벤트 드롭
  if "_jsonparsefailure" in [tags] {
    drop {}
  }

  # ELK 컴포넌트 자체 로그 드롭 (elasticsearch, filebeat 등 ECS 포맷 로그)
  if [service.name] {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "etl-logs-%{+YYYY.MM.dd}"
  }
}
