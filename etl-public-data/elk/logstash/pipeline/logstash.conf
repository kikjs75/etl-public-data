input {
  beats {
    port => 5044
  }
}

filter {
  # message 필드에 담긴 JSON 파싱
  json {
    source => "message"
  }

  # JSON 파싱 실패 이벤트 드롭 (rubydebug 재수집 라인 등 비구조화 텍스트)
  if "_jsonparsefailure" in [tags] {
    drop {}
  }

  # ELK 컴포넌트 자체 로그 드롭 (elasticsearch, filebeat, logstash 자체 로그)
  if [service.name] {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "etl-logs-%{+YYYY.MM.dd}"
  }
}
